services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./ticketing
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ticketing
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

  frontend:
    build: ./ticketing-ui
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
